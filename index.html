<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>体重管理アプリ</title>
  <meta name="description" content="社員体重管理アプリ">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="体重管理">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223b;
      --accent: #7c6af7;
      --accent2: #4cc9a0;
      --warn: #f59e0b;
      --danger: #f43f5e;
      --text: #f0f0ff;
      --text2: #9898b8;
      --text3: #5a5a7a;
      --border: rgba(255,255,255,0.08);
      --radius: 16px;
      --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }
    .header { padding: env(safe-area-inset-top, 0) 0 0; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; }
    .header-title { font-size: 18px; font-weight: 700; }
    .header-title span { color: var(--accent); }
    .tab-bar { display: flex; padding: 0 20px 12px; gap: 6px; }
    .tab { flex: 1; padding: 7px 0; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--text2); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .pages { flex: 1; overflow: hidden; position: relative; }
    .page { position: absolute; inset: 0; overflow-y: auto; padding: 16px 20px; display: none; }
    .page.active { display: block; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 14px; }
    .card-title { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
    .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .metric-card { background: var(--surface2); border-radius: 10px; padding: 12px 8px; text-align: center; }
    .metric-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
    .metric-value { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; line-height: 1; }
    .metric-unit { font-size: 10px; color: var(--text3); margin-top: 2px; }
    .metric-value.good { color: var(--accent2); }
    .metric-value.warn { color: var(--warn); }
    .metric-value.bad { color: var(--danger); }
    .emp-select-wrap { margin-bottom: 14px; }
    .emp-select-wrap label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 6px; text-transform: uppercase; }
    select { width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; appearance: none; }
    .form-row { margin-bottom: 12px; }
    .form-row label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 5px; text-transform: uppercase; }
    input[type="date"], input[type="number"], input[type="text"] { width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; color-scheme: dark; }
    .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
    #weight-chart { width: 100%; height: auto; display: block; }
    .history-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .history-item:last-child { border-bottom: none; }
    .history-date { font-size: 13px; color: var(--text2); }
    .history-weight { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; }
    .history-delta { font-family: 'DM Mono', monospace; font-size: 12px; }
    .history-del { background: none; border: 1px solid var(--border); color: var(--text3); border-radius: 6px; padding: 3px 8px; font-size: 11px; cursor: pointer; }
    .admin-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 8px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .admin-row:last-child { border-bottom: none; }
    .admin-name { font-size: 14px; font-weight: 500; }
    .admin-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .admin-weight { font-family: 'DM Mono', monospace; font-size: 14px; text-align: right; }
    .admin-diff { font-family: 'DM Mono', monospace; font-size: 12px; text-align: right; }
    .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
    .badge-good { background: rgba(76,201,160,0.15); color: var(--accent2); }
    .badge-warn { background: rgba(245,158,11,0.15); color: var(--warn); }
    .badge-bad { background: rgba(244,63,94,0.15); color: var(--danger); }
    .badge-none { background: var(--surface2); color: var(--text3); }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #fff; padding: 10px 24px; border-radius: 100px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 100; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .empty { text-align: center; padding: 32px 0; color: var(--text3); font-size: 13px; }
    .add-emp-row { display: flex; gap: 8px; }
    .add-emp-row input { flex: 1; }
    .add-emp-row .btn { width: auto; padding: 11px 20px; }
  </style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-title">体重<span>管理</span></div>
    <div style="font-size:12px;color:var(--text3);">ローカル保存</div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="showPage('employee', this)">社員</button>
    <button class="tab" onclick="showPage('admin', this)">管理者</button>
  </div>
</div>
<div class="pages">
  <div id="page-employee" class="page active">
    <div class="emp-select-wrap">
      <label>社員を選択</label>
      <select id="emp-select" onchange="loadEmployee()"></select>
    </div>
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">現在</div><div class="metric-value" id="cur-weight">--</div><div class="metric-unit">kg</div></div>
      <div class="metric-card"><div class="metric-label">目標</div><div class="metric-value" id="goal-weight">--</div><div class="metric-unit">kg</div></div>
      <div class="metric-card"><div class="metric-label">差分</div><div class="metric-value" id="diff-weight">--</div><div class="metric-unit">kg</div></div>
    </div>
    <div class="card">
      <div class="card-title">体重を記録</div>
      <div class="form-row"><label>日付</label><input type="date" id="record-date"></div>
      <div class="form-row"><label>体重 (kg)</label><input type="number" id="record-weight" step="0.1" min="30" max="200" placeholder="68.5"></div>
      <button class="btn btn-primary" onclick="addRecord()">記録する</button>
    </div>
    <div class="card">
      <div class="card-title">目標体重</div>
      <div class="form-row"><label>目標 (kg)</label><input type="number" id="goal-input" step="0.1" min="30" max="200" placeholder="65.0"></div>
      <button class="btn btn-secondary" onclick="setGoal()">目標を更新</button>
    </div>
    <div class="card"><div class="card-title">体重推移</div><svg id="weight-chart" viewBox="0 0 340 160"></svg></div>
    <div class="card"><div class="card-title">記録履歴</div><div id="history-list"></div></div>
  </div>
  <div id="page-admin" class="page">
    <div class="card">
      <div class="card-title">社員を追加</div>
      <div class="add-emp-row"><input type="text" id="new-emp-name" placeholder="氏名を入力"><button class="btn btn-primary" onclick="addEmployee()">追加</button></div>
    </div>
    <div class="card"><div class="card-title">全社員 体重一覧</div><div id="admin-list"></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const STORAGE_KEY='weight_app_v2';
function loadData(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||defaultData();}catch(e){return defaultData();}}
function defaultData(){return{employees:[{id:1,name:'田中 太郎',goal:70,records:[{date:'2025-12-01',weight:75.2},{date:'2026-01-01',weight:74.5},{date:'2026-02-01',weight:73.8},{date:'2026-03-01',weight:73.1}]},{id:2,name:'佐藤 花子',goal:58,records:[{date:'2025-12-01',weight:62.5},{date:'2026-01-01',weight:61.8},{date:'2026-02-01',weight:61.2},{date:'2026-03-01',weight:60.5}]},{id:3,name:'鈴木 一郎',goal:75,records:[{date:'2025-12-01',weight:80.1},{date:'2026-01-01',weight:79.0},{date:'2026-02-01',weight:78.5},{date:'2026-03-01',weight:77.8}]}],nextId:4};}
function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}
function showToast(msg,color){const t=document.getElementById('toast');t.textContent=msg;t.style.background=color||'var(--accent)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
let currentEmpId=null;
function init(){document.getElementById('record-date').value=new Date().toISOString().split('T')[0];populateSelect();loadEmployee();}
function populateSelect(){const data=loadData();const sel=document.getElementById('emp-select');sel.innerHTML=data.employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');if(!currentEmpId&&data.employees.length)currentEmpId=data.employees[0].id;sel.value=currentEmpId;}
function loadEmployee(){currentEmpId=parseInt(document.getElementById('emp-select').value);const data=loadData();const emp=data.employees.find(e=>e.id===currentEmpId);if(!emp)return;const recs=emp.records.slice().sort((a,b)=>a.date.localeCompare(b.date));const latest=recs.length?recs[recs.length-1].weight:null;document.getElementById('cur-weight').textContent=latest!==null?latest.toFixed(1):'--';document.getElementById('goal-weight').textContent=emp.goal?emp.goal.toFixed(1):'--';const diffEl=document.getElementById('diff-weight');if(latest!==null&&emp.goal){const diff=latest-emp.goal;diffEl.textContent=(diff>0?'+':'')+diff.toFixed(1);diffEl.className='metric-value '+(diff<=0?'good':diff<=3?'warn':'bad');}else{diffEl.textContent='--';diffEl.className='metric-value';}document.getElementById('goal-input').value=emp.goal||'';renderChart(recs,emp.goal);renderHistory(recs);}
function addRecord(){const d=document.getElementById('record-date').value;const w=parseFloat(document.getElementById('record-weight').value);if(!d||isNaN(w)||w<30||w>200){showToast('入力を確認してください','var(--danger)');return;}const data=loadData();const emp=data.employees.find(e=>e.id===currentEmpId);if(!emp)return;const idx=emp.records.findIndex(r=>r.date===d);if(idx>=0)emp.records[idx].weight=w;else emp.records.push({date:d,weight:w});saveData(data);document.getElementById('record-weight').value='';showToast('記録しました');loadEmployee();}
function setGoal(){const g=parseFloat(document.getElementById('goal-input').value);if(isNaN(g)||g<30||g>200){showToast('目標体重を確認してください','var(--danger)');return;}const data=loadData();const emp=data.employees.find(e=>e.id===currentEmpId);emp.goal=g;saveData(data);showToast('目標を更新しました');loadEmployee();}
function deleteRecord(date){if(!confirm('この記録を削除しますか？'))return;const data=loadData();const emp=data.employees.find(e=>e.id===currentEmpId);emp.records=emp.records.filter(r=>r.date!==date);saveData(data);loadEmployee();}
function renderHistory(recs){const sorted=recs.slice().sort((a,b)=>b.date.localeCompare(a.date));const el=document.getElementById('history-list');if(!sorted.length){el.innerHTML='<div class="empty">記録がありません</div>';return;}el.innerHTML=sorted.map((r,i)=>{const prev=sorted[i+1];const delta=prev?r.weight-prev.weight:null;const deltaStr=delta!==null?(delta>0?'+':'')+delta.toFixed(1)+' kg':'';const deltaColor=delta!==null?(delta<0?'var(--accent2)':delta>0?'var(--warn)':'var(--text3)'):'';const dateStr=r.date.replace(/-/g,'/');return`<div class="history-item"><div><div class="history-date">${dateStr}</div>${deltaStr?`<div class="history-delta" style="color:${deltaColor}">${deltaStr}</div>`:''}</div><div style="display:flex;align-items:center;gap:10px"><div class="history-weight">${r.weight.toFixed(1)} kg</div><button class="history-del" onclick="deleteRecord('${r.date}')">削除</button></div></div>`;}).join('');}
function renderChart(recs,goal){const svg=document.getElementById('weight-chart');const sorted=recs.slice().sort((a,b)=>a.date.localeCompare(b.date)).slice(-10);if(sorted.length<2){svg.innerHTML='<text x="170" y="80" text-anchor="middle" font-size="12" fill="#5a5a7a">2件以上の記録でグラフ表示</text>';return;}const W=340,H=160,pl=44,pr=16,pt=16,pb=28;const weights=sorted.map(r=>r.weight);const allVals=goal?[...weights,goal]:weights;const minW=Math.floor(Math.min(...allVals))-1;const maxW=Math.ceil(Math.max(...allVals))+1;const x=i=>pl+(i/(sorted.length-1))*(W-pl-pr);const y=v=>H-pb-((v-minW)/(maxW-minW))*(H-pt-pb);let grid='';for(let i=0;i<=4;i++){const v=minW+(maxW-minW)*i/4;const yy=y(v);grid+=`<line x1="${pl}" y1="${yy.toFixed(1)}" x2="${W-pr}" y2="${yy.toFixed(1)}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;grid+=`<text x="${pl-6}" y="${(yy+4).toFixed(1)}" text-anchor="end" font-size="9" fill="#5a5a7a">${v.toFixed(0)}</text>`;}const pts=sorted.map((r,i)=>`${x(i).toFixed(1)},${y(r.weight).toFixed(1)}`).join(' ');const areaBottom=y(minW);const areaPath=`M${x(0).toFixed(1)},${areaBottom} `+sorted.map((r,i)=>`L${x(i).toFixed(1)},${y(r.weight).toFixed(1)}`).join(' ')+` L${x(sorted.length-1).toFixed(1)},${areaBottom} Z`;let goalLine='';if(goal){const gy=y(goal).toFixed(1);goalLine=`<line x1="${pl}" y1="${gy}" x2="${W-pr}" y2="${gy}" stroke="#4cc9a0" stroke-width="1" stroke-dasharray="5,3"/><text x="${W-pr+2}" y="${(parseFloat(gy)+4).toFixed(0)}" font-size="9" fill="#4cc9a0">目標</text>`;}const dots=sorted.map((r,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(r.weight).toFixed(1)}" r="3.5" fill="#7c6af7"/>`).join('');const labels=sorted.map((r,i)=>{if(sorted.length>6&&i!==0&&i!==sorted.length-1)return'';const mo=r.date.slice(5,7)+'/'+r.date.slice(8,10);return`<text x="${x(i).toFixed(1)}" y="${H-pb+14}" text-anchor="middle" font-size="9" fill="#5a5a7a">${mo}</text>`;}).join('');svg.innerHTML=`<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7c6af7" stop-opacity="0.25"/><stop offset="100%" stop-color="#7c6af7" stop-opacity="0"/></linearGradient></defs>${grid}${goalLine}<path d="${areaPath}" fill="url(#ag)"/><polyline points="${pts}" fill="none" stroke="#7c6af7" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}${labels}`;}
function showPage(p,btn){document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');btn.classList.add('active');if(p==='admin')renderAdminList();}
function renderAdminList(){const data=loadData();const el=document.getElementById('admin-list');if(!data.employees.length){el.innerHTML='<div class="empty">社員を追加してください</div>';return;}el.innerHTML=data.employees.map(emp=>{const recs=emp.records.slice().sort((a,b)=>a.date.localeCompare(b.date));const latest=recs.length?recs[recs.length-1].weight:null;const diff=(latest!==null&&emp.goal)?latest-emp.goal:null;const diffStr=diff!==null?(diff>0?'+':'')+diff.toFixed(1):'--';const diffColor=diff===null?'':diff<=0?'var(--accent2)':diff<=3?'var(--warn)':'var(--danger)';let badge,badgeClass;if(diff===null){badge='未設定';badgeClass='badge-none';}else if(diff<=0){badge='達成';badgeClass='badge-good';}else if(diff<=5){badge='継続中';badgeClass='badge-warn';}else{badge='要注意';badgeClass='badge-bad';}const lastDate=recs.length?recs[recs.length-1].date.replace(/-/g,'/'):'未記録';return`<div class="admin-row"><div><div class="admin-name">${emp.name}</div><div class="admin-sub">最終: ${lastDate}</div></div><div class="admin-weight">${latest!==null?latest.toFixed(1)+'kg':'--'}</div><div class="admin-diff" style="color:${diffColor}">${diffStr!=='--'?diffStr+'kg':'--'}</div><span class="badge ${badgeClass}">${badge}</span></div>`;}).join('');}
function addEmployee(){const name=document.getElementById('new-emp-name').value.trim();if(!name){showToast('名前を入力してください','var(--danger)');return;}const data=loadData();if(data.employees.find(e=>e.name===name)){showToast('同じ名前が既にあります','var(--warn)');return;}data.employees.push({id:data.nextId++,name,goal:null,records:[]});saveData(data);document.getElementById('new-emp-name').value='';showToast(name+' を追加しました');populateSelect();renderAdminList();}
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));}
init();
</script>
</body>
</html>
